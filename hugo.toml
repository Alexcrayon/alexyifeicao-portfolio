baseURL = "https://alexcrayon.github.io/alexyifeicao-portfolio/"
languageCode = "en-us"
title = "Yifei | Portfolio"
theme = "PaperMod"
[pagination]
    pagerSize = 10

[params.author]
  name = "Alex"
[params]
  mainSections = ["blog"] 
  defaultTheme = "dark"           # dark, light, or auto
  showReadingTime = false
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showToc = false

  [params.homeInfoParams]
    Title = "Hi, I'm Yifei (Alex)"
    Content = "MSCS @ Northeastern · Computer Graphics · Game Dev"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Alexcrayon"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/yifei-cao-32b15328a/"

  [[params.socialIcons]]
    name = "email"
    url = "caoyifei.sz@gmail.com"

[menu]
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 1

  # [[menu.main]]
  #   identifier = "blog"
  #   name = "Blog"
  #   url = "/blog/"
  #   weight = 2

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true